---
# Source: tigera-prometheus-operator/templates/00-namespace-tigera-prometheus.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: tigera-prometheus
  annotations:
    openshift.io/node-selector: ""
  labels:
    name: tigera-prometheus
    openshift.io/run-level: "0"
---
# Source: tigera-prometheus-operator/templates/02-serviceaccount-prometheus-operator.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: calico-prometheus-operator
  namespace: tigera-prometheus
---
# Source: tigera-prometheus-operator/templates/01-imagepullsecret-tigera-prometheus.yaml
apiVersion: v1
kind: Secret
metadata:
  name: tigera-pull-secret
  namespace: tigera-prometheus
data:
  .dockerconfigjson: e30=
type: kubernetes.io/dockerconfigjson
---
# Source: tigera-prometheus-operator/templates/04-deployment-prometheus-operator.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calico-prometheus-operator
  namespace: tigera-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      operator: prometheus
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: calico-prometheus-operator
      labels:
        operator: prometheus
    spec:
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - effect: NoSchedule
          key: kubernetes.io/arch
          operator: Equal
          value: arm64
      serviceAccountName: calico-prometheus-operator
      imagePullSecrets:
        - name: tigera-pull-secret
      containers:
        - name: calico-prometheus-operator
          image: gcr.io/unique-caldron-775/cnx/tigera/prometheus-operator:master
          args:
            - --cluster-domain=cluster.local
            - --config-reloader-memory-request=50Mi
            - --namespaces=tigera-prometheus
            - --prometheus-config-reloader=gcr.io/unique-caldron-775/cnx/tigera/prometheus-config-reloader:master
            - --config-reloader-cpu-limit=150m
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 200Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
