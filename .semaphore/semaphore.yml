blocks:
  - name: Check images availability
    run:
      # Script fails on enterprise due to missing values.yaml.
      when: "false and (false or (branch !~ 'build-v.*' and change_in(['/charts/', '/manifests/'], {pipeline_file: 'ignore'})))"
    dependencies: []
    task:
      jobs:
        - name: Check images availability
          commands:
            - make check-images-availability
  - name: Check SemaphoreCI files
    run:
      when: >-
        false or
        change_in(['/.semaphore', '*/.sempahore', '/hack', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'track'})
    dependencies: []
    task:
      jobs:
        - name: Check semaphore files
          commands:
            - make gen-semaphore-yaml
            - make check-dirty
            - make check-release-cut-promotions
  - name: Check YAML files
    run:
      when: >-
        false or
        change_in(['/**/*.yml', '/**/*.yaml', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'track'})
    dependencies: []
    task:
      jobs:
        - name: Check YAML files
          commands:
            - make yaml-lint
  - name: Check Go
    run:
      when: >-
        false or
        change_in(['/go.mod', '/go.sum', '/**/*.go', '/**/deps.txt', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "preflight-go-checks"
      agent:
        machine:
          type: f1-standard-4
          os_image: ubuntu2204
      jobs:
        - name: Check Go files
          env_vars:
            - name: STORE_BUILD_CACHE
              value: "true"
          commands:
            - make check-go-mod
            - make verify-go-mods
            - make gen-deps-files
            - make go-vet
            - >-
              if [ -n "$SEMAPHORE_GIT_PR_NUMBER" ]; then
                make fix-changed
              else
                make fix-all
              fi
            - make check-dirty
  - name: Check Python
    run:
      when: >-
        false or
        change_in(['/networking-calico', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check Python files
          commands:
            - make -C networking-calico fmtpy
            - make -C networking-calico flake8
            - make check-dirty
  - name: Check language/Dockerfiles
    run:
      when: >-
        false or
        change_in(['/**/*'], {pipeline_file: 'track', exclude: ['libbpf', '.[a-z]*']})
    dependencies: []
    task:
      jobs:
        - name: Check language/Dockerfiles
          commands:
            # Both of these are very quick grep checks so we combine them into one job.
            - make check-language || true # Enterprise hasn't been cleaned up yet
            - make check-dockerfiles
            - make check-gotchas
  - name: Check protobufs
    run:
      when: >-
        false or
        change_in(['/**/*.pb.go', '/**/*.proto', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check protobufs
          commands:
            - make protobuf fix-changed
            - make check-dirty
  - name: Manifests and API docs
    run:
      when: >-
        false or
        change_in(['/api', '/manifests', '/charts', '/libcalico-go/lib/apis', '/libcalico-go/config', '/libcalico-go/Makefile', '/felix/config', '/felix/docs', '/felix/Makefile', '/goldmane', '/Makefile', '/lib.Makefile', '/metadata.mk', 'third_party/prometheus-operator', 'third_party/eck-operator'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check manifests and API docs
          commands:
            - make -C lib gen-files
            - make -C api gen-files
            - make -C libcalico-go gen-files
            - make -C felix gen-files
            - make -C goldmane gen-files
            - make gen-prometheus-crds
            - make gen-eck-crds
            - make gen-manifests
            - make fix-changed
            - make check-ocp-no-crds
            - make check-dirty
  - name: Store working copy
    run:
      when: "branch =~ '.*'"
    dependencies: []
    task:
      env_vars:
        - name: SKIP_CACHE_RESTORE
          value: "true"
      jobs:
        - name: Save working copy to cache
          commands:
            - cd ..
            - tar --use-compress-program="zstd -3" -cf /tmp/working-copy.tar.zstd $CALICO_DIR_NAME
            - gcs_branch_cache_dir="${GCS_CACHE_DIR}/${SEMAPHORE_GIT_BRANCH}"
            - gcloud storage cp /tmp/working-copy.tar.zstd "$gcs_branch_cache_dir/working-copy.tar.zstd"
  - name: Prerequisites
    skip:
      # Always skip, this is a dummy job used to group prerequisite checks.
      when: "true"
    dependencies:
      - Check SemaphoreCI files
      - Check YAML files
      - Check Go
      - Check Python
      - Check language/Dockerfiles
      - Check protobufs
      - Manifests and API docs
      - Store working copy
    task:
      jobs:
        - name: Pre-flight checks
          commands:
            - "true"
  - name: API
    run:
      when: "false or change_in(['/metadata.mk', '/lib.Makefile', '/api/'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})"
    execution_time_limit:
      minutes: 30
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - cd api
      jobs:
        - name: "API: CI"
          commands:
            - ../.semaphore/run-and-monitor make-ci.log make ci
  - name: API Server
    run:
      when: "change_in(['/.semaphore/semaphore.yml.d/01-preamble.yml','/.semaphore/semaphore.yml.d/02-global_job_config.yml','/.semaphore/semaphore.yml.d/03-promotions.yml','/.semaphore/semaphore.yml.d/09-blocks.yml','/.semaphore/semaphore.yml.d/99-after_pipeline.yml','/.semaphore/semaphore.yml.d/blocks/20-apiserver.yml','/apiserver/**','/crypto/pkg/tls/*.go','/hack/test/certs/','/lib.Makefile','/lib/std/uniquelabels/*.go','/lib/std/uniquestr/*.go','/libcalico-go/lib/apiconfig/*.go','/libcalico-go/lib/apis/v3/*.go','/libcalico-go/lib/backend/*.go','/libcalico-go/lib/backend/api/*.go','/libcalico-go/lib/backend/encap/*.go','/libcalico-go/lib/backend/etcdv3/*.go','/libcalico-go/lib/backend/k8s/*.go','/libcalico-go/lib/backend/k8s/conversion/*.go','/libcalico-go/lib/backend/k8s/resources/*.go','/libcalico-go/lib/backend/k8s/scheme/*.go','/libcalico-go/lib/backend/model/*.go','/libcalico-go/lib/backend/watchersyncer/*.go','/libcalico-go/lib/clientv3/*.go','/libcalico-go/lib/compliance/*.go','/libcalico-go/lib/errors/*.go','/libcalico-go/lib/hash/*.go','/libcalico-go/lib/jitter/*.go','/libcalico-go/lib/json/*.go','/libcalico-go/lib/logutils/*.go','/libcalico-go/lib/metricsserver/*.go','/libcalico-go/lib/names/*.go','/libcalico-go/lib/namespace/*.go','/libcalico-go/lib/net/*.go','/libcalico-go/lib/options/*.go','/libcalico-go/lib/resources/*.go','/libcalico-go/lib/selector/*.go','/libcalico-go/lib/selector/parser/*.go','/libcalico-go/lib/selector/tokenizer/*.go','/libcalico-go/lib/set/*.go','/libcalico-go/lib/validator/v3/*.go','/libcalico-go/lib/validator/v3/query/*.go','/libcalico-go/lib/watch/*.go','/libcalico-go/lib/winutils/*.go','/licensing/client/*.go','/licensing/client/features/*.go','/licensing/crypto/*.go','/licensing/monitor/*.go','/licensing/utils/*.go','/metadata.mk','/node/pkg/bgp/*.go','/node/pkg/metrics/*.go','/pkg/buildinfo/*.go'], {pipeline_file: 'ignore', exclude: ['/**/*.md','/**/.gitignore','/**/AUTHORS*','/**/CONTRIBUTING*','/**/DEVELOPER_GUIDE*','/**/LICENSE*','/**/README*','/**/SECURITY.md','/crypto/**/*_test.go','/lib/**/*_test.go','/libcalico-go/**/*_test.go','/licensing/**/*_test.go','/node/**/*_test.go','/pkg/**/*_test.go']})"
    execution_time_limit:
      minutes: 30
    dependencies:
      - Prerequisites
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "apiserver"
      prologue:
        commands:
          - cd apiserver
      jobs:
        - name: "API Server: CI"
          commands:
            - ../.semaphore/run-and-monitor make-ci.log make ci
          env_vars:
            - name: STORE_BUILD_CACHE
              value: "true"
        - name: "API Server: Build"
          matrix:
            - env_var: ARCH
              values:
                - arm64
          commands:
            - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
