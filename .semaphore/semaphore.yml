        - name: BUILD_CACHE_GROUP
          value: "node"
        - name: CI_GROUP_LABEL
          value: "node"
        - name: CI_JOB_LABEL
          value: "kind-cluster-tests"
      prologue:
        commands:
          - docker login --username casey@tigera.io -u _json_key -p "$(cat ~/secrets/secret.google-service-account-key.json)" https://gcr.io
          # Set up access to GCP buckets.
          - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/secret.google-service-account-key.json
          - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
          - gcloud config set project unique-caldron-775
          - cd node
          - export SHORT_WORKFLOW_ID=$(echo ${SEMAPHORE_WORKFLOW_ID} | sha256sum | cut -c -8)
          - export ZONE=europe-west3-c
          - export VM_PREFIX=sem-${SEMAPHORE_PROJECT_NAME}-${SHORT_WORKFLOW_ID}-kind-
          - echo VM_PREFIX=${VM_PREFIX}
          - export COMPONENT=node
          - export VM_DISK_SIZE=120GB
          - mkdir artifacts
          - ./.semaphore/cache-test-artifacts
      jobs:
        - name: "Node: kind-cluster tests"
          execution_time_limit:
            minutes: 180
          commands:
            - ../.semaphore/vms/run-tests-on-vms ${VM_PREFIX}
      epilogue:
        always:
          commands:
            - '../.semaphore/vms/publish-reports "Node: KinD STs"'
            - ../.semaphore/vms/clean-up-vms ${VM_PREFIX}
      secrets:
        - name: google-service-account-for-gcr
        - name: google-service-account-for-gce
        - name: tigera-dev-ci-pull-credentials
        - name: test-customer-license
  - name: 'Packaging (pkg)'
