    dependencies:
      - Prerequisites
    task:
      secrets:
        # Since we create a local kind cluster, we need the test license.
        - name: test-customer-license
      prologue:
        commands:
          # Log in to GCR - deploying the kind cluster currently requires pulling
          # private elastic / kibana images from unique-caldron-775.
          - docker login -u _json_key -p "$(cat ~/secrets/docker_auth.json)" https://gcr.io
          # We need to log in to GCP in order to build intrusion detection.
          - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/banzai-google-service-account.json
          - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
      agent:
        machine:
          type: f1-standard-4
          os_image: ubuntu2204
      jobs:
        - name: Conformance e2e tests
          execution_time_limit:
            minutes: 60
          commands:
            - .semaphore/run-and-monitor e2e-test.log make e2e-test
  - name: envoy-gateway
    run:
      when: "false or change_in(['/metadata.mk', '/lib.Makefile', '/third_party/envoy-gateway'], {exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE'], pipeline_file: 'ignore'})"
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - cd third_party/envoy-gateway
      jobs:
        - name: Build binaries
          matrix:
            - env_var: ARCH
              values:
                - amd64
                - arm64
          commands:
            - ../../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
  - name: envoy-proxy
    run:
      when: "false or change_in(['/metadata.mk', '/lib.Makefile', '/third_party/envoy-proxy'], {exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})"
    execution_time_limit:
      minutes: 30
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - cd third_party/envoy-proxy
      jobs:
        - name: make ci
          commands:
            - ../../.semaphore/run-and-monitor make-ci.log make ci
        - name: Build binary
          matrix:
            - env_var: ARCH
              values:
                - arm64
          commands:
            - ../../.semaphore/run-and-monitor image-$ARCH.log make build ARCH=$ARCH
  - name: envoy-ratelimit
    run:
      when: "false or change_in(['/metadata.mk', '/lib.Makefile', '/third_party/envoy-ratelimit'], {exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE'], pipeline_file: 'ignore'})"
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - cd third_party/envoy-ratelimit
      jobs:
        - name: Build binaries
          matrix:
            - env_var: ARCH
              values:
                - amd64
                - arm64
          commands:
            - ../../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
