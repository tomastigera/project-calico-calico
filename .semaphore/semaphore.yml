      when: "false or change_in(['/selinux/'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})"
    dependencies:
      - Prerequisites
    task:
      secrets:
        - name: google-service-account-for-gce
      prologue:
        commands:
          - cd selinux
          - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/secret.google-service-account-key.json
          - export COMPONENT=$(basename $(pwd))
          - export SHORT_WORKFLOW_ID=$(echo ${SEMAPHORE_WORKFLOW_ID} | sha256sum | cut -c -8)
          - export VM_PREFIX=sem-${SEMAPHORE_PROJECT_NAME}-${SHORT_WORKFLOW_ID}-selinux
          - export ZONE=europe-west3-c
          - echo VM_PREFIX=${VM_PREFIX}
      jobs:
        - name: "SELinux: CI"
          commands:
            - make ci
      epilogue:
        always:
          commands:
            - ../.semaphore/vms/clean-up-vms ${VM_PREFIX}
  - name: Alert Manager
    run:
      when: "false or change_in(['/third_party/alertmanager/'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})"
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - sem-version go 1.25.3
          - cd third_party/alertmanager
      jobs:
        - name: "Alert Manager: CI"
          commands:
            - ../../.semaphore/run-and-monitor ci.log make ci
        - name: "Alert Manager: build arm64 Image"
          matrix:
            - env_var: ARCH
              values:
                - arm64
          commands:
            - ../../.semaphore/run-and-monitor build-$ARCH.log make image ARCH=$ARCH
