blocks:
  - name: Check images availability
    run:
      # Script fails on enterprise due to missing values.yaml.
      when: "false and (true or (branch !~ 'build-v.*' and change_in(['/charts/', '/manifests/'], {pipeline_file: 'ignore'})))"
    dependencies: []
    task:
      jobs:
        - name: Check images availability
          commands:
            - make check-images-availability
  - name: Check SemaphoreCI files
    run:
      when: >-
        true or
        change_in(['/.semaphore', '*/.sempahore', '/hack', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'track'})
    dependencies: []
    task:
      jobs:
        - name: Check semaphore files
          commands:
            - make gen-semaphore-yaml
            - make check-dirty
            - make check-release-cut-promotions
  - name: Check YAML files
    run:
      when: >-
        true or
        change_in(['/**/*.yml', '/**/*.yaml', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'track'})
    dependencies: []
    task:
      jobs:
        - name: Check YAML files
          commands:
            - make yaml-lint
  - name: Check Go
    run:
      when: >-
        true or
        change_in(['/go.mod', '/go.sum', '/**/*.go', '/**/deps.txt', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "preflight-go-checks"
      agent:
        machine:
          type: f1-standard-4
          os_image: ubuntu2204
      jobs:
        - name: Check Go files
          env_vars:
            - name: STORE_BUILD_CACHE
              value: "true"
          commands:
            - make check-go-mod
            - make verify-go-mods
            - make gen-deps-files
            - make go-vet
            - >-
              if [ -n "$SEMAPHORE_GIT_PR_NUMBER" ]; then
                make fix-changed
              else
                make fix-all
              fi
            - make check-dirty
  - name: Check Python
    run:
      when: >-
        true or
        change_in(['/networking-calico', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check Python files
          commands:
            - make -C networking-calico fmtpy
            - make -C networking-calico flake8
            - make check-dirty
  - name: Check language/Dockerfiles
    run:
      when: >-
        true or
        change_in(['/**/*'], {pipeline_file: 'track', exclude: ['libbpf', '.[a-z]*']})
    dependencies: []
    task:
      jobs:
        - name: Check language/Dockerfiles
          commands:
            # Both of these are very quick grep checks so we combine them into one job.
            - make check-language || true # Enterprise hasn't been cleaned up yet
            - make check-dockerfiles
            - make check-gotchas
  - name: Check protobufs
    run:
      when: >-
        true or
        change_in(['/**/*.pb.go', '/**/*.proto', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check protobufs
          commands:
            - make protobuf fix-changed
            - make check-dirty
  - name: Manifests and API docs
    run:
      when: >-
        true or
        change_in(['/api', '/manifests', '/charts', '/libcalico-go/lib/apis', '/libcalico-go/config', '/libcalico-go/Makefile', '/felix/config', '/felix/docs', '/felix/Makefile', '/goldmane', '/Makefile', '/lib.Makefile', '/metadata.mk', 'third_party/prometheus-operator', 'third_party/eck-operator'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check manifests and API docs
          commands:
            - make -C lib gen-files
            - make -C api gen-files
            - make -C libcalico-go gen-files
            - make -C felix gen-files
            - make -C goldmane gen-files
            - make gen-prometheus-crds
            - make gen-eck-crds
            - make gen-manifests
            - make fix-changed
            - make check-ocp-no-crds
            - make check-dirty
  - name: Store working copy
    run:
      when: "branch =~ '.*'"
    dependencies: []
    task:
      env_vars:
        - name: SKIP_CACHE_RESTORE
          value: "true"
      jobs:
        - name: Save working copy to cache
          commands:
            - cd ..
            - tar --use-compress-program="zstd -3" -cf /tmp/working-copy.tar.zstd $CALICO_DIR_NAME
            - gcs_branch_cache_dir="${GCS_CACHE_DIR}/${SEMAPHORE_GIT_BRANCH}"
            - gcloud storage cp /tmp/working-copy.tar.zstd "$gcs_branch_cache_dir/working-copy.tar.zstd"
  - name: Prerequisites
    skip:
      # Always skip, this is a dummy job used to group prerequisite checks.
      when: "true"
    dependencies:
      - Check SemaphoreCI files
      - Check YAML files
      - Check Go
      - Check Python
      - Check language/Dockerfiles
      - Check protobufs
      - Manifests and API docs
      - Store working copy
    task:
      jobs:
        - name: Pre-flight checks
          commands:
            - "true"
  - name: API
    run:
      when: "true or change_in(['/metadata.mk', '/lib.Makefile', '/api/'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})"
    execution_time_limit:
      minutes: 30
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - cd api
      jobs:
        - name: "API: CI"
          commands:
            - ../.semaphore/run-and-monitor make-ci.log make ci
  - name: API Server
    run:
      when: "true"
    execution_time_limit:
      minutes: 30
    dependencies:
      - Prerequisites
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "apiserver"
      prologue:
        commands:
          - cd apiserver
      jobs:
        - name: "API Server: CI"
          commands:
            - ../.semaphore/run-and-monitor make-ci.log make ci
          env_vars:
            - name: STORE_BUILD_CACHE
              value: "true"
        - name: "API Server: Build"
          matrix:
            - env_var: ARCH
              values:
                - arm64
          commands:
            - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
  - name: Refresh GeoIP cache
    run:
      when: "false"
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - cache delete app-policy-geoip
      epilogue:
        on_pass:
          commands:
            - cache store app-policy-geoip app-policy/geoip
      jobs:
        - name: "Application Layer Policy: Refresh GeoIP cache"
          commands:
            - make -C app-policy geoip/dbip-city-lite.mmdb
  - name: Application Layer Policy
    run:
      when: "true"
    dependencies:
      - Refresh GeoIP cache
    task:
      prologue:
        commands:
          - cache restore app-policy-geoip
          - cd app-policy
      epilogue:
        always:
          commands:
            - test-results publish report --name "App policy"
        on_pass:
          commands:
            - cache store app-policy-geoip app-policy/geoip
      jobs:
        - name: "Application Layer Policy: CI"
          commands:
            - ../.semaphore/run-and-monitor ci.log make ci
  - name: 'Application Layer Policy: native arm64 runner'
    run:
      when: "true"
    dependencies:
      - Application Layer Policy
    task:
      agent:
        machine:
          type: s1-aws-arm64-2
      prologue:
        commands:
          - cd app-policy
      epilogue:
        always:
          commands:
            - test-results publish report --name "App policy" --suite-prefix=(arm64)
      jobs:
        - name: "Application Layer Policy: build arm64"
          commands:
            - ../.semaphore/run-and-monitor build-arm64.log make build arch=arm64
  - name: calicoctl
    run:
      when: "true"
    dependencies:
      - Prerequisites
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "calicoctl"
      prologue:
        commands:
          - cd calicoctl
      jobs:
        - name: "calicoctl: CI"
          commands:
            - ../.semaphore/run-and-monitor ci.log make ci
          env_vars:
            - name: STORE_BUILD_CACHE
              value: "true"
        - name: "calicoctl: build arm64"
          matrix:
            - env_var: ARCH
              values:
                - arm64
          commands:
            - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
  - name: CNI Plugin
    run:
      when: "true"
    dependencies:
      - Prerequisites
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "cni-plugin"
      prologue:
        commands:
          - cd cni-plugin
      jobs:
        - name: "CNI Plugin: CI"
          commands:
            - ../.semaphore/run-and-monitor ci.log make ci
          env_vars:
            - name: STORE_BUILD_CACHE
              value: "true"
        - name: "CNI Plugin: build multi-arch"
          matrix:
            - env_var: ARCH
              values:
                - arm64
          commands:
            - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
        - name: "CNI Plugin: build windows images"
          commands:
            - ../.semaphore/run-and-monitor ci.log make image-windows
  - name: "CNI Plugin: Windows"
    run:
      when: "false or true"
    dependencies:
      - Prerequisites
    task:
      secrets:
        - name: banzai-secrets
      prologue:
        commands:
          # Load the github access secrets.  First fix the permissions.
          - chmod 0600 ~/.keys/*
          - ssh-add ~/.keys/*
          # Prepare azure configuration.
          - az login --service-principal -u "${AZ_SP_ID}" -p "${AZ_SP_PASSWORD}" --tenant "${AZ_TENANT_ID}" --output none
          - export AZURE_SUBSCRIPTION_ID=$AZ_SUBSCRIPTION_ID
          - export AZURE_TENANT_ID=$AZ_TENANT_ID
          - export AZURE_CLIENT_ID=$AZ_SP_ID
          - export AZURE_CLIENT_SECRET=$AZ_SP_PASSWORD
          - export REPORT_DIR=/home/semaphore/calico-private/process/testing/winfv-cni-plugin/report
          - export LOGS_DIR=~/fv.log
          - export RG_PREFIX=${USER}-win-cni-${SEMAPHORE_GIT_SHA:0:4}-pr${SEMAPHORE_GIT_PR_NUMBER}
          - cd cni-plugin
