- name: UI APIs
  run:
    when: "${CHANGE_IN(ui-apis)}"
  dependencies:
    - Prerequisites
  task:
    agent:
      machine:
        # ui-apis tests simulate a cluster with large flows, a high-memory runner is required.
        type: f1-standard-4
        os_image: ubuntu2204
    prologue:
      commands:
        - cd ui-apis
    jobs:
      - name: "UI APIs: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "UI APIs: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
