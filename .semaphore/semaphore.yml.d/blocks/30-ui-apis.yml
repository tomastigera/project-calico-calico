- name: ui-apis
  run:
    when: "${CHANGE_IN(ui-apis)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd ui-apis
    jobs:
      - name: ui-apis tests
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: Build binary
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
