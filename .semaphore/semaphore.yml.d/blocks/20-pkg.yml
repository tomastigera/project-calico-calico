- name: 'Packaging (pkg)'
  run:
    when: "${FORCE_RUN} or change_in(['/lib/std/', '/pkg/'], {pipeline_file: 'ignore'})"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd pkg
    jobs:
      - name: 'Packaging (pkg): CI'
        commands:
          - ../.semaphore/run-and-monitor make-ci.log make ci
