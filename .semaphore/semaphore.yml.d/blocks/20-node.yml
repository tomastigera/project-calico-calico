- name: "Node: Build"
  run:
    when: "${CHANGE_IN(node)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "node"
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2004
    secrets:
      # Mount a secret for pulling images from GCR, and a license for the k8s FVs
      - name: tigera-dev-ci-pull-credentials
      - name: google-service-account-for-gcr
      - name: test-customer-license
    prologue:
      commands:
        - cd node
    jobs:
      - name: "Node: CI"
        priority:
          # This job is on the critical path so we increase its priority.
          - value: 51
            when: "pull_request =~ '.+'"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
        env_vars:
          - name: STORE_BUILD_CACHE
            value: "true"
    epilogue:
      always:
        commands:
          - test-results publish ./report/nosetests.xml --name "node-ci" || true
- name: "Node: multi-arch build"
  run:
    when: "${CHANGE_IN(node)}"
  dependencies:
    - "Node: Build"
  task:
    secrets:
      # Mount a secret for pulling images from GCR, and a license for the k8s FVs
      - name: tigera-dev-ci-pull-credentials
      - name: google-service-account-for-gcr
      - name: test-customer-license
    prologue:
      commands:
        - cd node
    jobs:
      - name: "Node: build Windows archive"
        commands:
          - ../.semaphore/run-and-monitor build-windows-archive.log make build-windows-archive
      - name: "Node: build Windows image"
        commands:
          - ../.semaphore/run-and-monitor build-windows-image.log make image-windows
- name: "Node: Build - native arm64 runner"
  run:
    when: "${CHANGE_IN(node)}"
  dependencies:
    - "Node: Build"
  task:
    agent:
      machine:
        type: s1-aws-arm64-4
    secrets:
      - name: tigera-dev-ci-pull-credentials
    prologue:
      commands:
        - cd node
    jobs:
      - name: "Node: build arm64 image"
        commands:
          - ../.semaphore/run-and-monitor build-arm64.log make image ARCH=arm64
- name: "Node: kind-cluster tests"
  run:
    # KinD tests also build and run all the other images.
    when: "${CHANGE_IN(node,typha,apiserver,cni-plugin,pod2daemon,calicoctl,kube-controllers,non-go:/.semaphore/vms/)}"
  dependencies:
    - "Prerequisites"
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "node"
      - name: CI_GROUP_LABEL
        value: "node"
      - name: CI_JOB_LABEL
        value: "kind-cluster-tests"
    prologue:
      commands:
        - docker login --username casey@tigera.io -u _json_key -p "$(cat ~/secrets/secret.google-service-account-key.json)" https://gcr.io
        # Set up access to GCP buckets.
        - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/secret.google-service-account-key.json
        - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
        - gcloud config set project unique-caldron-775
        - cd node
        - export SHORT_WORKFLOW_ID=$(echo ${SEMAPHORE_WORKFLOW_ID} | sha256sum | cut -c -8)
        - export ZONE=europe-west3-c
        - export VM_PREFIX=sem-${SEMAPHORE_PROJECT_NAME}-${SHORT_WORKFLOW_ID}-kind-
        - echo VM_PREFIX=${VM_PREFIX}
        - export COMPONENT=node
        - export VM_DISK_SIZE=120GB
        - mkdir artifacts
        - ./.semaphore/cache-test-artifacts
    jobs:
      - name: "Node: kind-cluster tests"
        execution_time_limit:
          minutes: 180
        commands:
          - ../.semaphore/vms/run-tests-on-vms ${VM_PREFIX}
    epilogue:
      always:
        commands:
          - '../.semaphore/vms/publish-reports "Node: KinD STs"'
          - ../.semaphore/vms/clean-up-vms ${VM_PREFIX}
    secrets:
      - name: google-service-account-for-gcr
      - name: google-service-account-for-gce
      - name: tigera-dev-ci-pull-credentials
      - name: test-customer-license
