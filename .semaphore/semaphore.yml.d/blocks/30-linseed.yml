- name: Linseed
  run:
    when: "${CHANGE_IN(linseed)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd linseed
    jobs:
      - name: "Linseed: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Linseed: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
