- name: Egress gateway
  run:
    when: "${CHANGE_IN(egress-gateway)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd egress-gateway
    jobs:
      - name: "Egress gateway: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
    epilogue:
      always:
        commands:
          - ../.semaphore/publish-artifacts

- name: Egress gateway - native arm64 runner
  run:
    when: "${CHANGE_IN(egress-gateway)}"
  dependencies:
    - Egress gateway
  task:
    agent:
      machine:
        type: s1-aws-arm64-2
    prologue:
      commands:
        # The makefile sometimes tries to rebuild the protobufs but
        # the build fails on ARM (and we know they're fresh due to
        # the pre-flight job).
        - touch felix/proto/felixbackend.pb.go
        - cd egress-gateway
    jobs:
      - name: "Egress gateway: build arm64"
        commands:
          - ../.semaphore/run-and-monitor build-arm64.log make image ARCH=arm64
    epilogue:
      always:
        commands:
          - ../.semaphore/publish-artifacts
