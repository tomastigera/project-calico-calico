- name: Licensing
  run:
    when: "${CHANGE_IN(licensing)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd licensing
    jobs:
      - name: "Licensing: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Licensing: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish ./report/*.xml --name "Licensing: UT" || true'
