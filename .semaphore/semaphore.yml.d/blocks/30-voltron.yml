- name: Voltron
  run:
    when: "${CHANGE_IN(voltron)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd voltron
    jobs:
      - name: "Voltron: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Voltron: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
