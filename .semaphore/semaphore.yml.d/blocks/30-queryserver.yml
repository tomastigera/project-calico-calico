- name: Query Server
  run:
    when: "${CHANGE_IN(queryserver)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd queryserver
    jobs:
      - name: "Query Server: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Query Server: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
