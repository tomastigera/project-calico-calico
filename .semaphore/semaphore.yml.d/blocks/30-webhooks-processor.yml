- name: "Webhooks Processor"
  run:
    when: "${CHANGE_IN(webhooks-processor)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd webhooks-processor
    jobs:
      - name: "Webhooks Processor: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Webhooks Processor: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish ./report/*.xml --name "Webhooks processor: UT" || true'
