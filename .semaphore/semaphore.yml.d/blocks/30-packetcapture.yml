- name: Packet Capture
  run:
    when: "${CHANGE_IN(packetcapture)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd packetcapture
    jobs:
      - name: "Packet Capture: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Packet Capture: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
