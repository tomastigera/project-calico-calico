- name: Logging/Monitoring/Alerting library (lma)
  run:
    when: "${CHANGE_IN(lma)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd lma
    jobs:
      - name: "lma: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
