- name: "Tools (hack directory)"
  run:
    when: "${FORCE_RUN} or change_in(['/metadata.mk', '/lib.Makefile', '/hack/', '/api/', '/libcalico-go/'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']${DEFAULT_BRANCH}})"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd hack
    jobs:
      - name: "Tools (hack directory): CI"
        commands:
          - ../.semaphore/run-and-monitor make-ci.log make ci
    epilogue:
      always:
        commands:
          - 'test-results publish ./report/*.xml --name "Tools: UT" || true'
