- name: calicoq
  run:
    when: "${CHANGE_IN(calicoq)}"
  dependencies:
    - Prerequisites
  task:
    secrets:
      - name: test-customer-license
    prologue:
      commands:
        - cd calicoq
    jobs:
      - name: "calicoq: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "calicoq: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
