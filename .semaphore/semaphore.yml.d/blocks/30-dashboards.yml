- name: dashboards
  run:
    when: "${CHANGE_IN(dashboards)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd dashboards
    jobs:
      - name: dashboards tests
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: Build binary
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
