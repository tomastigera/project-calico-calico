- name: Dashboards
  run:
    when: "${CHANGE_IN(dashboards)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd dashboards
    jobs:
      - name: "Dashboards: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Dashboards: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish ./report/*.xml --name "Dashboards: UT" || true'
