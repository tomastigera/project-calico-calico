- name: Elasticsearch metrics
  run:
    when: "${CHANGE_IN(elasticsearch-metrics)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd elasticsearch-metrics
    jobs:
      - name: "Elasticsearch metrics: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Elasticsearch metrics: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
