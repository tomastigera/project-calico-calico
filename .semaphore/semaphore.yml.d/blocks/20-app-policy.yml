- name: app-policy
  run:
    when: "${CHANGE_IN(app-policy)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd app-policy
        - cache restore app-policy-geoip
    epilogue:
      always:
        commands:
          - test-results publish report
    jobs:
      - name: app-policy tests
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
          - cache store app-policy-geoip geoip

- name: app-policy - native arm64 runner
  run:
    when: "${CHANGE_IN(app-policy)}"
  dependencies:
    - app-policy
  task:
    agent:
      machine:
        type: s1-aws-arm64-2
    prologue:
      commands:
        - cd app-policy
    epilogue:
      always:
        commands:
          - test-results publish report
    jobs:
      - name: build binary
        commands:
          - ../.semaphore/run-and-monitor build-arm64.log make build arch=arm64
