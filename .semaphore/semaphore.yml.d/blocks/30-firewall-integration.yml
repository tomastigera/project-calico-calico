- name: Firewall integration
  run:
    when: "${CHANGE_IN(firewall-integration)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd firewall-integration
    jobs:
      - name: "Firewall integration: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Firewall integration: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
