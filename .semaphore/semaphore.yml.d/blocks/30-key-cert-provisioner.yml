- name: key-cert-provisioner
  run:
    when: "${CHANGE_IN(key-cert-provisioner)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "key-cert-provisioner"
    prologue:
      commands:
        - cd key-cert-provisioner
    jobs:
      - name: "key-cert-provisioner: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
        env_vars:
          - name: STORE_BUILD_CACHE
            value: "true"
      - name: "key-cert-provisioner: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish ./report/*.xml --name "Key cert provisioner: UT" || true'
