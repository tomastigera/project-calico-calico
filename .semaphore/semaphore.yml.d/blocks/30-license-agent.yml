- name: license-agent
  run:
    when: "${CHANGE_IN(license-agent)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd license-agent
    jobs:
      - name: License Agent tests
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: Build binary
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
