- name: Intrusion detection controller
  run:
    when: "${CHANGE_IN(intrusion-detection-controller)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cache restore ids-geoip
        - cd intrusion-detection-controller
    jobs:
      - name: "Intrusion detection controller: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Intrusion detection controller: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
      on_pass:
        commands:
          - cache store ids-geoip intrusion-detection-controller/geoip
