- name: Intrusion detection controller
  run:
    when: "${CHANGE_IN(intrusion-detection-controller)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/banzai-google-service-account.json
        - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
        - cd intrusion-detection-controller
    jobs:
      - name: "Intrusion detection controller: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Intrusion detection controller: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish ./report/*.xml --name "IDS Controller: UT" || true'
