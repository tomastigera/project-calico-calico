- name: kube-controllers
  run:
    when: "${CHANGE_IN(kube-controllers)}"
  dependencies:
    - Prerequisites
  task:
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "kube-controllers"
    prologue:
      commands:
        - cd kube-controllers
    jobs:
      - name: "kube-controllers: CI"
        commands:
          - export TEST_SUITE_PREFIX=""
          - ../.semaphore/run-and-monitor ci.log make ci
        env_vars:
          - name: STORE_BUILD_CACHE
            value: "true"
      - name: "kube-controllers: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - export TEST_SUITE_PREFIX="$ARCH"
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - test-results publish report --name "kube-controllers" --suite-prefix="$TEST_SUITE_PREFIX"
