- name: calicoctl
  run:
    when: "${CHANGE_IN(calicoctl)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd calicoctl
    jobs:
      - name: "calicoctl: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "calicoctl: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
