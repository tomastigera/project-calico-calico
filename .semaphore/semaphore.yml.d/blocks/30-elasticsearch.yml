- name: Publish tigera/elasticsearch images
  run:
    when: "${WEEKLY_RUN} or change_in(['/third_party/elasticsearch'], {exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE'], pipeline_file: 'ignore'${DEFAULT_BRANCH}})"
  dependencies:
    - Prerequisites
  task:
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    secrets:
      - name: google-service-account-for-gcr
    prologue:
      commands:
        - docker login --username casey@tigera.io -u _json_key -p "$(cat ~/secrets/secret.google-service-account-key.json)" https://gcr.io
    jobs:
      - name: "Publish tigera/elasticsearch images: Linux amd64"
        commands:
          - make -C third_party/elasticsearch cd ARCHES=amd64 CONFIRM=true
- name: Publish tigera/elasticsearch images - native arm64 runner
  run:
    when: "${WEEKLY_RUN} or change_in(['/third_party/elasticsearch'], {exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE'], pipeline_file: 'ignore'${DEFAULT_BRANCH}})"
  dependencies:
    - Prerequisites
  task:
    agent:
      machine:
        type: s1-aws-arm64-2
    secrets:
      - name: google-service-account-for-gcr
    prologue:
      commands:
        - docker login --username casey@tigera.io -u _json_key -p "$(cat ~/secrets/secret.google-service-account-key.json)" https://gcr.io
    jobs:
      - name: "Publish tigera/elasticsearch images: Linux arm64"
        commands:
          - make -C third_party/elasticsearch cd ARCHES=arm64 CONFIRM=true
- name: Publish tigera/elasticsearch multi-arch manifests
  run:
    when: "${WEEKLY_RUN} or change_in(['/third_party/elasticsearch'], {exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE'], pipeline_file: 'ignore'${DEFAULT_BRANCH}})"
  dependencies:
    - Publish tigera/elasticsearch images
    - Publish tigera/elasticsearch images - native arm64 runner
  task:
    secrets:
      - name: google-service-account-for-gcr
    prologue:
      commands:
        - docker login --username casey@tigera.io -u _json_key -p "$(cat ~/secrets/secret.google-service-account-key.json)" https://gcr.io
    jobs:
      - name: "Publish tigera/elasticsearch multi-arch manifests: Linux multi-arch"
        commands:
          - make -C third_party/elasticsearch push-manifest CONFIRM=true

- name: Elasticsearch
  run:
    when: "${CHANGE_IN(elasticsearch)}"
  dependencies:
    - Publish tigera/elasticsearch multi-arch manifests
  task:
    secrets:
      - name: google-service-account-for-gcr
    prologue:
      commands:
        - docker login --username casey@tigera.io -u _json_key -p "$(cat ~/secrets/secret.google-service-account-key.json)" https://gcr.io
        - cd elasticsearch
    jobs:
      - name: "Elasticsearch: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Elasticsearch: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
