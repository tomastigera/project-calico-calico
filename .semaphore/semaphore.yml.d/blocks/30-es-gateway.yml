- name: es-gateway
  run:
    when: "${CHANGE_IN(es-gateway)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd es-gateway
    jobs:
      - name: es-gateway tests
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: Build binary
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
