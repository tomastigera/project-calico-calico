# In OSS, we run these tests directly on the Semaphore runner. However, Enterprise uses substantially more
# resources, so we run them on GCP VMs.
- name: E2E tests
  run:
    when: "${CHANGE_IN(e2e,node,typha,apiserver,cni-plugin,pod2daemon,calicoctl,kube-controllers,goldmane,whisker,whisker-backend,non-go:/.semaphore/vms/)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "e2e-tests"
      - name: CI_GROUP_LABEL
        value: "e2e"
      - name: CI_JOB_LABEL
        value: "conformance"
    secrets:
      - name: test-customer-license
      - name: google-service-account-for-gcr
      - name: google-service-account-for-gce
      - name: tigera-dev-ci-pull-credentials
    prologue:
      commands:
        # Log in to GCR - deploying the kind cluster currently requires pulling
        # private elastic / kibana images from unique-caldron-775.
        - docker login -u _json_key -p "$(cat ~/secrets/docker_auth.json)" https://gcr.io
        # We need to log in to GCP in order to build intrusion detection.
        - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/banzai-google-service-account.json
        - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
        - gcloud config set project unique-caldron-775
        - cd e2e
        - export SHORT_WORKFLOW_ID=$(echo ${SEMAPHORE_WORKFLOW_ID} | sha256sum | cut -c -8)
        - export ZONE=europe-west3-c
        - export VM_PREFIX=sem-${SEMAPHORE_PROJECT_NAME}-${SHORT_WORKFLOW_ID}-e2e-
        - echo VM_PREFIX=${VM_PREFIX}
        - export COMPONENT=e2e
        - export VM_DISK_SIZE=120GB
        - mkdir artifacts
        - ./.semaphore/cache-test-artifacts
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: "E2E tests: Conformance"
        execution_time_limit:
          minutes: 120
        commands:
          - ../.semaphore/vms/run-tests-on-vms ${VM_PREFIX}
    epilogue:
      always:
        commands:
          - '../.semaphore/vms/publish-reports "E2E: Conformance"'
          - ../.semaphore/vms/clean-up-vms ${VM_PREFIX}
