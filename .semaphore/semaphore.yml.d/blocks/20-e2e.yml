- name: e2e tests
  run:
    when: "${FORCE_RUN} or change_in(['/*', '/e2e', '/api/', '/libcalico-go/', '/typha/', '/felix/', '/confd/', '/bird/', '/pod2daemon/', '/node/', '/licensing/'], {exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']${DEFAULT_BRANCH}})"
  dependencies:
    - Prerequisites
  task:
    secrets:
      # Since we create a local kind cluster, we need the test license.
      - name: test-customer-license
    prologue:
      commands:
        # Log in to GCR - deploying the kind cluster currently requires pulling
        # private elastic / kibana images from unique-caldron-775.
        - docker login -u _json_key -p "$(cat ~/secrets/docker_auth.json)" https://gcr.io
        # We need to log in to GCP in order to build intrusion detection.
        - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/banzai-google-service-account.json
        - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: Conformance e2e tests
        execution_time_limit:
          minutes: 60
        commands:
          - .semaphore/run-and-monitor e2e-test.log make e2e-test
