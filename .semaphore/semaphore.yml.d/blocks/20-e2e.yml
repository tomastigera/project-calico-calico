- name: "E2E tests (cluster routing: BIRD)"
  run:
    when: "${CHANGE_IN(e2e,node,typha,apiserver,cni-plugin,pod2daemon,calicoctl,kube-controllers,goldmane,whisker,whisker-backend)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "e2e-tests"
    secrets:
      # Since we create a local kind cluster, we need the test license.
      - name: test-customer-license
    prologue:
      commands:
        # Log in to GCR - deploying the kind cluster currently requires pulling
        # private elastic / kibana images from unique-caldron-775.
        - docker login -u _json_key -p "$(cat ~/secrets/docker_auth.json)" https://gcr.io
        # We need to log in to GCP in order to build intrusion detection.
        - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/banzai-google-service-account.json
        - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: "E2E tests: Conformance (cluster routing: BIRD)"
        execution_time_limit:
          minutes: 60
        commands:
          # We need to prune the pre-loaded images to ensure we have enough /var/lib/docker disk space to run the e2e tests.
          - sudo docker system prune -af
          - .semaphore/run-and-monitor e2e-test.log make e2e-test
        env_vars:
          - name: CLUSTER_ROUTING
            value: "BIRD"
          - name: STORE_BUILD_CACHE
            value: "true"
- name: "E2E tests (cluster routing: Felix)"
  run:
    when: "${CHANGE_IN(e2e,node,typha,apiserver,cni-plugin,pod2daemon,calicoctl,kube-controllers,goldmane,whisker,whisker-backend)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "e2e-tests"
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: "E2E tests: Conformance (cluster routing: Felix)"
        execution_time_limit:
          minutes: 60
        commands:
          - .semaphore/run-and-monitor e2e-test-felix-routing.log make e2e-test
        env_vars:
          - name: CLUSTER_ROUTING
            value: "FELIX"
          - name: E2E_SKIP
            value: "BGP"
          - name: STORE_BUILD_CACHE
            value: "true"
