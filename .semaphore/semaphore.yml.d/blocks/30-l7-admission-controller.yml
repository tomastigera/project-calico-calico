- name: L7 Admission Controller
  run:
    when: "${CHANGE_IN(l7-admission-controller)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd l7-admission-controller
    jobs:
      - name: "L7 Admission Controller: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "L7 Admission Controller: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
    epilogue:
      always:
        commands:
          - 'test-results publish ./report/*.xml --name "L7 admission controller: UT" || true'
