version: v1.0
name: Publish hashrelease
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204
execution_time_limit:
  hours: 4

global_job_config:
  secrets:
    # Github SSH secret for pulling private repositories.
    - name: private-repo
    # Secret for GitHub API access.
    - name: marvin-github-token
    # Secret for pushing to the docs box.
    - name: docs-ssh
    # Secret for image registries
    - name: hashrelease-images
    - name: iss-image-scanning
    # Secrets for Slack notifications
    - name: releasebot-slack
    # Secret for Semaphore API access
    - name: semaphore-api
    # OIDC-related credentials
    - name: oidc-credentials-gcp-tigera-dev-ci
    - name: oidc-credentials-gcp-hashrelease-publish

  prologue:
    commands:
      - chmod 0600 ~/.keys/*
      - ssh-add ~/.keys/*

      # Install createrepo-c for RPMs
      - sudo apt-get -qq update && sudo apt-get -qq install --no-install-recommends createrepo-c

      # Checkout the code and unshallow it.
      - checkout
      - retry git fetch --quiet --unshallow

        # Credentials for accessing gcloud
      - echo "${SEMAPHORE_OIDC_TOKEN}" > "${SEMAPHORE_TOKEN_FILE_PATH}"
      - |
        gcloud iam workload-identity-pools create-cred-config \
            $OIDC_GCP_POOL_URI \
            --quiet \
            --service-account="${OIDC_SERVICE_ACCOUNT_EMAIL}" \
            --service-account-token-lifetime-seconds="${OIDC_SERVICE_ACCOUNT_LIFETIME}" \
            --output-file="${GOOGLE_APPLICATION_CREDENTIALS}" \
            --credential-source-file="${SEMAPHORE_TOKEN_FILE_PATH}" \
            --credential-source-type="text"
      - gcloud auth login --quiet --cred-file="${GOOGLE_APPLICATION_CREDENTIALS}"
      - gcloud config set project --quiet "${OIDC_GCP_PROJECT_NAME}"
      # Configure docker to use the gcloud credential helper
      - gcloud auth configure-docker --quiet
      - gcloud auth configure-docker --quiet us-central1-docker.pkg.dev

blocks:
  - name: Publish hashrelease
    task:
      jobs:
        - name: Build and publish hashrelease
          commands:
            - make hashrelease
            - artifact push workflow _output/hashrelease/hashrelease.yaml
      prologue:
        commands:
          - export GITHUB_TOKEN=${MARVIN_GITHUB_TOKEN}
          - cd release
      env_vars:
        - name: OPERATOR_REGISTRY
          value: gcr.io/unique-caldron-775/cnx
        - name: REGISTRIES
          value: gcr.io/unique-caldron-775/cnx/tigera
        - name: WINDOWS_GCS_BUCKET
          value: tigera-windows/dev
        - name: HELM_REGISTRIES
          value: us-central1-docker.pkg.dev/unique-caldron-775/hashrelease-charts

  - name: Smoke Tests
    dependencies: ["Publish hashrelease"]
    task:
      secrets:
        - name: banzai-secrets
      prologue:
        commands:
          - artifact pull workflow _output/hashrelease/hashrelease.yaml -d release/_output/hashrelease/hashrelease.yaml
      jobs:
        - name: "Run hashrelease enterprise smoke tests"
          execution_time_limit:
            hours: 4
          commands:
            - cd release
            - make hashrelease-validate
