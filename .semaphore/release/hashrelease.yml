version: v1.0
name: Publish hashrelease
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204
execution_time_limit:
  hours: 6

global_job_config:
  secrets:
    - name: oss-release-secrets
    # Github SSH secret for pulling private repositories.
    - name: private-repo
    # Secret for GitHub API access.
    - name: marvin-github-token
    # Secret for image registries
    - name: quay-hashrelease
    - name: docker
    - name: iss-image-scanning
    # Secrets for Slack notifications
    - name: releasebot-slack
    # OIDC-related credentials
    - name: oidc-credentials-gcp-projectcalico-org
    - name: oidc-credentials-gcp-oss-hashrelease-publish

  prologue:
    commands:
      - chmod 0600 ~/.keys/*
      - ssh-add ~/.keys/*
      # Checkout the code and unshallow it.
      - checkout
      - retry git fetch --quiet --unshallow
      # Log in to container registries needed for release.
      - echo $DOCKER_TOKEN | docker login --username "$DOCKER_USER" --password-stdin
      - echo $QUAY_TOKEN | docker login --username "$QUAY_USER" --password-stdin quay.io
      # Credentials for accessing gcloud
      - echo "${SEMAPHORE_OIDC_TOKEN}" > "${SEMAPHORE_TOKEN_FILE_PATH}"
      - |
        gcloud iam workload-identity-pools create-cred-config \
            $OIDC_GCP_POOL_URI \
            --quiet \
            --service-account="${OIDC_SERVICE_ACCOUNT_EMAIL}" \
            --service-account-token-lifetime-seconds="${OIDC_SERVICE_ACCOUNT_LIFETIME}" \
            --output-file="${GOOGLE_APPLICATION_CREDENTIALS}" \
            --credential-source-file="${SEMAPHORE_TOKEN_FILE_PATH}" \
            --credential-source-type="text"
      - gcloud auth login --quiet --cred-file="${GOOGLE_APPLICATION_CREDENTIALS}"
      - gcloud config set project --quiet "${OIDC_GCP_PROJECT_NAME}"
      # Configure docker to use the gcloud credential helper
      - gcloud auth configure-docker --quiet
      - gcloud auth configure-docker --quiet us-central1-docker.pkg.dev

blocks:
  - name: Publish hashrelease
    task:
      jobs:
        - name: Build and publish hashrelease
          commands:
            - make hashrelease
      prologue:
        commands:
          - export GITHUB_TOKEN=${MARVIN_GITHUB_TOKEN}
          - export NOTIFY=false  # Disable notification here - will be sent after smoke tests
          - cd release

  - name: Smoke Tests
    dependencies: ["Publish hashrelease"]
    task:
      env_vars:
        - name: INSTALLER
          value: operator
        - name: K8S_E2E_FLAGS
          value: --ginkgo.focus=(\[SmokeTest\]) --ginkgo.skip=(\[Disabled\]|\[Slow\]|\[Disruptive\])
        - name: ENABLE_SKIMBLE
          value: "false"
        - name: FUNCTIONAL_AREA
          value: "smoke"
        - name: RELEASE_STREAM
          value: master
        - name: USE_HASH_RELEASE
          value: "true"
        - name: USE_LATEST_RELEASE
          value: "false"
      secrets:
        - name: marvin-github-ssh-private-key
        - name: banzai-secrets
      prologue:
        commands:
          - /end-to-end/scripts/global_prologue.sh
      epilogue:
        always:
          commands:
            - /end-to-end/scripts/global_epilogue.sh
      jobs:
        - name: "gcp-kubeadm stable-1 CalicoIptables"
          execution_time_limit:
            hours: 4
          commands:
            - /end-to-end/scripts/body_standard.sh
          matrix:
            - env_var: PROVISIONER
              values: ["gcp-kubeadm"]
            - env_var: K8S_VERSION
              values: ["stable-1"]
            - env_var: DATAPLANE
              values: ["CalicoIptables"]

after_pipeline:
  task:
    jobs:
      - name: Send Hashrelease Announcement
        commands:
          - checkout
          - export GITHUB_TOKEN=${MARVIN_GITHUB_TOKEN}
          - cd release
          - make bin/release
          # Fetch smoke test job ID from the Semaphore API and send announcement
          - |
            # Get the smoke test job ID from current pipeline
            SMOKE_TEST_JOB_ID=$(curl -s -H "Authorization: Token ${SEMAPHORE_API_TOKEN}" \
              "https://tigera-delivery.semaphoreci.com/api/v1alpha/pipelines/${SEMAPHORE_PIPELINE_ID}/jobs" \
              | jq -r '.[] | select(.metadata.name | contains("Smoke Tests")) | .metadata.id' | head -n1)
            # Export for the announce command
            export SMOKE_TEST_JOB_ID="${SMOKE_TEST_JOB_ID}"
            # Always send announcement with the test result status
            bin/release hashrelease announce --notify

promotions:
  - name: Cleanup jobs
    pipeline_file: /end-to-end/pipelines/cleanup.yml
    auto_promote:
      when: "result = 'stopped'"
