version: v1.0
name: Publish official release
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204
execution_time_limit:
  hours: 8
blocks:
  - name: "Publish official release"
    dependencies: []
    skip:
      # Only run on branches that begin with 'release-calient-v'
      when: "branch !~ '^release-calient-v'"
    task:
      env_vars:
        - name: CONFIRM
          value: "true"
      secrets:
        - name: marvin-github-ssh-private-key
        - name: marvin-aws-config
        - name: marvin-aws-credentials
        - name: marvin-release-cutting-credentials
        # The GPG signing key for apt repositories
        - name: marvin-release-signing-gpg
      prologue:
        commands:
          # Correct permissions since they are too open by default
          - chmod 0600 ~/.keys/*
          # Add the key to the ssh agent:
          - ssh-add ~/.keys/*
          # Checkout the code and unshallow it.
          - checkout
          - retry git fetch --quiet --unshallow
          # Log in to container registries needed for release.
          - docker login --username marvin@tigera.io -u _json_key -p "$(cat ~/secrets/marvin-gcr-credentials.json)" https://gcr.io
          - echo $MARVIN_QUAY_TOKEN | docker login --username $MARVIN_QUAY_USERNAME https://quay.io --password-stdin
          # Install the tools our release depends on
          - install-package createrepo-c reprepro gpg
          # Import our release signing GPG key
          - gpg --import /home/semaphore/secrets/marvin-release-key.gpg
          - export GPG_KEY_ID=${MARVIN_GPG_KEY_ID}

      jobs:
        - name: "Release on Semaphore VM"
          commands:
            - if [ -z "${SEMAPHORE_GIT_PR_NUMBER}" ]; then make GIT_BRANCH=${SEMAPHORE_GIT_BRANCH} release; fi
            - if [ -z "${SEMAPHORE_GIT_PR_NUMBER}" ]; then make GIT_BRANCH=${SEMAPHORE_GIT_BRANCH} release-publish; fi
  - name: "Update Helm index"
    dependencies:
      - "Publish official release"
    skip:
      when: "branch !~ '^release-calient-v/'"
    task:
      secrets:
        - name: marvin-github-ssh-private-key
        - name: marvin-aws-config
        - name: marvin-aws-credentials
      prologue:
        commands:
          - chmod 0600 ~/.keys/*
          - ssh-add ~/.keys/*
          - git clone git@github.com:tigera/process.git ~/process
      jobs:
        - name: "Update Helm index"
          commands:
            - |
              if [ -z "${SEMAPHORE_GIT_PR_NUMBER}" ]; then
                cd ~/process/releases/calico/helmindex
                docker build --progress plain -t helm_updater:stable .
                docker run --rm -t \
                  --net=host \
                  -e AWS_PROFILE \
                  -e PRODUCT=calient \
                  -v $HOME/.aws:/root/.aws:ro \
                  helm_updater:stable || exit 1
              fi
