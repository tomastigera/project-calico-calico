version: v1.0

name: calient private - smoke tests

agent:
  machine:
    type: c1-standard-1
    os_image: ubuntu2204

auto_cancel:
  queued:
    when: "true"

execution_time_limit:
  hours: 12

global_job_config:
  prologue:
    commands_file: ../scripts/global_prologue.sh
  epilogue:
    always:
      commands:
        - ./scripts/global_epilogue.sh
  secrets:
    - name: marvin-github-ssh-private-key
    - name: banzai-secrets
  env_vars:
    - name: K8S_E2E_FLAGS
      value: --ginkgo.focus=(\[SmokeTest\]) --ginkgo.skip=(\[Disabled\]|\[Slow\]|\[Disruptive\])
    - name: ENABLE_SKIMBLE
      value: "false"
    - name: FUNCTIONAL_AREA
      value: "smoke"
    - name: RELEASE_STREAM
      value: master
    - name: USE_HASH_RELEASE
      value: "true"                       # Use this env_var for executing smoke tests on hashrelease
    - name: USE_LATEST_RELEASE
      value: "false"                      # It should be false when USE_HASH_RELEASE is true

blocks:
  - name: operator - smoke tests
    dependencies: []
    task:
      env_vars:
        - name: INSTALLER
          value: operator
      jobs:
        - name: "gcp-kubeadm  stable-1 CalicoIptables"
          execution_time_limit:
            hours: 4
          commands:
            - ./scripts/body_standard.sh
          matrix:
            - env_var: PROVISIONER
              values: ["gcp-kubeadm"]
            - env_var: K8S_VERSION
              values: ["stable-1"]
            - env_var: DATAPLANE
              values: ["CalicoIptables"]

promotions:
  - name: Cleanup jobs
    pipeline_file: /end-to-end/pipelines/cleanup.yml
    auto_promote:
      when: "result = 'stopped'"

after_pipeline:
  task:
    jobs:
      - name: Reports
        commands:
          - test-results gen-pipeline-report --force