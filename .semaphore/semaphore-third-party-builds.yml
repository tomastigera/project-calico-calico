version: v1.0
name: Calico
execution_time_limit:
  hours: 4
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
auto_cancel:
  running:
    when: "branch != 'master'"
  queued:
    when: "branch != 'master'"
global_job_config:
  secrets:
    - name: banzai-secrets
    - name: docker-hub
    - name: private-repo
  prologue:
    commands:
      # Correct permissions since they are too open by default:
      - chmod 0600 ~/.keys/*
      # Remove all keys from the ssh agent so that only the ones from our
      # secret are used.  Without this, ssh may try to use Semaphore's default
      # ssh key, which can only access repos that have Semaphore builds.
      - ssh-add -D
      # Add the key to the ssh agent:
      - ssh-add ~/.keys/*
      - checkout
      - export REPO_DIR="$(pwd)"
      - mkdir artifacts
      # Semaphore is doing shallow clone on a commit without tags.
      # unshallow it for GIT_VERSION:=$(shell git describe --tags --dirty --always)
      - if [[ "${SEMAPHORE_BLOCK_NAME}" != "Prerequisites" ]]; then retry git fetch --unshallow; fi
      - echo $DOCKERHUB_PASSWORD | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  epilogue:
    commands:
      - cd "$REPO_DIR"
      - .semaphore/publish-artifacts
blocks:
  - name: Prerequisites
    run:
      when: "true or change_in(['/'], {pipeline_file: 'track'})"
    dependencies: []
    task:
      agent:
        machine:
          type: f1-standard-2
          os_image: ubuntu2204
      jobs:
        - name: Pre-flight checks
          commands:
            - make ci-preflight-checks
  - name: Publish tigera/snort3 images
