          - docker login --username casey@tigera.io -u _json_key -p "$(cat ~/secrets/secret.google-service-account-key.json)" https://gcr.io
          - cd kibana
      jobs:
        - name: "Kibana: CI"
          commands:
            - ../.semaphore/run-and-monitor ci.log make ci
  - name: Refresh GeoIP cache
    run:
      when: "true"
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - cache delete app-policy-geoip
      epilogue:
        on_pass:
          commands:
            - cache store app-policy-geoip app-policy/geoip
      jobs:
        - name: Refresh GeoIP cache
          commands:
            - make -C app-policy geoip/dbip-city-lite.mmdb
