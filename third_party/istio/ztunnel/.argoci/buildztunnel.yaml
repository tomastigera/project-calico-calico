apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: istio-ztunnel-
  labels:
    repo: calico-private
    component: istio-ztunnel
    type: CD
spec:
  entrypoint: istio-ztunnel-pipeline
  onExit: exit-handler
  nodeSelector:
    role: argoci
    spot: "false"
  tolerations:
    - key: argoci
      operator: Exists
    - key: argoci-nonspot
      operator: Exists
  templateDefaults:
    script:
      image: gcr.io/tigera-cc-dev/ci-base/gcp-vm-runner:v0.01
      imagePullPolicy: Always
      command: ["bash", "-e"]
      workingDir: "/src"
    podSpecPatch: |-
      containers:
        - name: main
          envFrom:
            - secretRef:
                name: banzai-secrets
            - secretRef:
                name: marvin-github-ssh-private-key
            - secretRef:
                name: quay-robot-semaphore-v2
            - secretRef:
                name: docker-hub

  templates:
    ###########################################################################
    # Main pipeline DAG
    ###########################################################################
    - name: istio-ztunnel-pipeline
      dag:
        tasks:
          - name: build-arm64
            template: build-arm64
          - name: build-amd64
            template: build-amd64
          - name: publish
            depends: build-arm64.Succeeded && build-amd64.Succeeded
            template: publish

    ###########################################################################
    # ARM64 Build (on Tau T2A VMs)
    # Rust builds are less intensive than C++ so we can use smaller VMs
    ###########################################################################
    - name: build-arm64
      script:
        env:
          - name: GOOGLE_VM_MACHINE_TYPE
            value: "t2a-standard-16"          # ARM64 with 16 cores (sufficient for Rust)
          - name: GOOGLE_VM_ZONE
            value: "us-central1-b"
          - name: GOOGLE_VM_IMAGE
            value: "argoci-image-arm64"
          - name: GOOGLE_VM_DISK_TYPE
            value: "pd-ssd"                   # Fast SSD for build
          - name: GOOGLE_VM_DISK_SIZE
            value: "200GB"                    # ArgoCI base images require 200GB minimum
          - name: RUN_AS_NONROOT
            value: "true"
        source: |
          source provisionArgoVirtualMachine
          secretRequired 'banzai-google-service-account.json' '${HOME}/secrets/banzai-google-service-account.json'
          secretRequired 'marvin' '${HOME}/.keys/marvin'
          secretRequired 'QUAY_TOKEN'
          secretRequired 'QUAY_USERNAME'
          secretRequired 'DOCKERHUB_PASSWORD'
          secretRequired 'DOCKERHUB_USERNAME'
          source runFileOnVirtualMachine "third_party/istio/ztunnel/.argoci/scripts/build-ztunnel.sh build arm64"
          cleanupArgoVirtualMachine
          exit ${CI_EXIT_CODE}

    ###########################################################################
    # AMD64 Build (on N2 VMs)
    ###########################################################################
    - name: build-amd64
      script:
        env:
          - name: GOOGLE_VM_MACHINE_TYPE
            value: "n2-standard-16"           # x86 with 16 cores
          - name: GOOGLE_VM_DISK_TYPE
            value: "pd-ssd"
          - name: GOOGLE_VM_DISK_SIZE
            value: "200GB"
          - name: RUN_AS_NONROOT
            value: "true"
        source: |
          source provisionArgoVirtualMachine
          secretRequired 'banzai-google-service-account.json' '${HOME}/secrets/banzai-google-service-account.json'
          secretRequired 'marvin' '${HOME}/.keys/marvin'
          secretRequired 'QUAY_TOKEN'
          secretRequired 'QUAY_USERNAME'
          secretRequired 'DOCKERHUB_PASSWORD'
          secretRequired 'DOCKERHUB_USERNAME'
          source runFileOnVirtualMachine "third_party/istio/ztunnel/.argoci/scripts/build-ztunnel.sh build amd64"
          cleanupArgoVirtualMachine
          exit ${CI_EXIT_CODE}

    ###########################################################################
    # Publish multi-arch manifest
    ###########################################################################
    - name: publish
      script:
        source: |
          source provisionArgoVirtualMachine
          secretRequired 'banzai-google-service-account.json' '${HOME}/secrets/banzai-google-service-account.json'
          secretRequired 'marvin' '${HOME}/.keys/marvin'
          secretRequired 'QUAY_TOKEN'
          secretRequired 'QUAY_USERNAME'
          secretRequired 'DOCKERHUB_PASSWORD'
          secretRequired 'DOCKERHUB_USERNAME'
          source runFileOnVirtualMachine "third_party/istio/ztunnel/.argoci/scripts/build-ztunnel.sh publish"
          cleanupArgoVirtualMachine
          exit ${CI_EXIT_CODE}

    ###########################################################################
    # Exit handler for cleanup
    ###########################################################################
    - name: exit-handler
      steps:
        - - name: cleanup
            template: cleanup

    - name: cleanup
      script:
        source: |
          checkAndCleanupLeakedVms
